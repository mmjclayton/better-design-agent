# Design review gate for Bitbucket Pipelines.
#
# Fails the build if design-intel detects regressions or violations above
# the configured thresholds. Add this step to your bitbucket-pipelines.yml.
#
# Default mode is **pragmatic**: grandfathers pre-existing violations and
# only fails on NEW critical/serious issues.
#
# Before use:
#   1. Set DESIGN_REVIEW_URL below to a reachable preview/staging URL.
#   2. (Optional) tune thresholds — see `design-intel ci --help`.
#   3. Store any required API keys as Repository Variables
#      (Settings > Pipelines > Repository Variables).

pipelines:
  pull-requests:
    "**":
      - step:
          name: Design Review
          image: python:3.12-slim
          script:
            - pip install design-intelligence
            - playwright install --with-deps chromium
            - |
              design-intel ci \
                --url "$DESIGN_REVIEW_URL" \
                --format json > design-review.json
            # To switch to zero-tolerance: add --strict
            # To add a hard score floor:    add --min-score 70
          artifacts:
            - design-review.json
